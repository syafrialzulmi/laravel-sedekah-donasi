version: "3.8"

networks:
  laravel:
    driver: bridge

services:
  nginx:
    image: nginx:latest
    container_name: nginx-silkade
    restart: unless-stopped
    ports:
      - "5757:80"
    volumes:
      - .:/var/www
      - ./docker-compose/nginx/silkade.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - laravel

  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: php-silkade
    restart: unless-stopped
    volumes:
      - .:/var/www
      - ./docker-compose/php/custom-php.ini:/usr/local/etc/php/conf.d/custom-php.ini
    networks:
      - laravel

volumes:
  dbdata: